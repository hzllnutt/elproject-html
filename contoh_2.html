<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color:blueviolet;
            font-family: Arial, Helvetica, sans-serif;
        }

        label {
            font-weight : bold;
            margin-bottom : 5px;
            display: block;
        }

        input [type = 'text'], 
        input [type = 'date'],
        input [type = 'email'],
        select {
            width: 95%;
            padding : 10px;
            border-radius: 5px;
            border: 3px solid pink;
        }
        
        button{
            background-color: violet;
            padding: 10px;
            color: white;
            border-radius: 5px;
            cursor : pointer;
            font-size : 16px;
            margin-top : 10px;
            border: none;
        }

        button:hover {
            background-color: brown;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background-color:white;
            padding : 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px brown;
        }

        .form-group {
            margin-bottom: 15px;
        }

    </style>
</head>

<body>
    <div class="container">
        <form action="" method= "post" enctype="multipart/form-data">
            <div class="form-group">
                <label for = "first name">Nama Lengkap</label>
                <input type = "text" name = "first name" id = "first name" placeholder = "Your Name">
    </div>

    <div class = "form-group"> 
        <label for = "email">Email</label>
        <input type = "email" name = "email" id = "email" placeholder = "Your Email">
    </div>
    
    <div class = "form-group">
        <label for = "birth_date">Tanggal Lahir</label>
        <input type = "date" name = "birth_date" id = birth_date >
    </div>
    
    <div class = "form-group">
        <label for = "">Jenis Kelamin</label>
        <input type = "radio" name = "gender" value = "L"> Laki-laki
        <input type = "radio" name = "gender" value = "P"> Perempuan 
    </div>

    <div class = "form-group">  
        <label for ="">Agama</label>
        <select name = "religion">
            <option value="">--CHOOSE YOUR RELIGION--</option>
            <option value="">Islam</option>
            <option value="">Hindu</option>
            <option value="">Budha</option>
            <option value="">Protestan</option>
            <option value="">Katholik</option>
            <option value="">Khonghutchu</option>
        </select>
    </div>
        
    <div class = "form-group"> 
        <label for =""> Hobby</label>
        <div class = "checkbox group">
        <input type = "checkbox" >Dance
        <input type = "checkbox" >Drawing
        <input type = "checkbox" >Sport 
        <input type = "checkbox" >Jogging
        <input type = "checkbox" >Running
        </div>
    </div>

        <button type = "submit"> Submit</button>
        
    </form>
</div>
   
</body>
</html>
